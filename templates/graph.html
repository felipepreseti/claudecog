<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__ · ClaudeCog Map</title>
    <style>
      :root {
        --bg: #04040a;
        --ink: #eef0ff;
        --dim: #8a8aa8;
        --line: rgba(123, 104, 238, 0.18);
        --orange: #ff6b35;
        --yellow: #f7b801;
        --green: #10b981;
        --cyan: #06b6d4;
        --blue: #6366f1;
        --purple: #7b68ee;
        --magenta: #a855f7;
        --grey: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #000; color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        overflow: hidden;
      }
      canvas { display: block; }
      #canvas { position: fixed; inset: 0; z-index: 1; }
      kbd {
        display: inline-block; padding: 2px 7px; min-width: 20px; text-align: center;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18);
        border-bottom-width: 2px; border-radius: 4px; color: var(--ink);
      }

      #loader {
        position: fixed; inset: 0; z-index: 100;
        background:
          radial-gradient(900px 500px at 70% 20%, rgba(123, 104, 238, 0.18), transparent 60%),
          radial-gradient(800px 500px at 20% 80%, rgba(255, 107, 53, 0.14), transparent 60%),
          #04040a;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 40px; gap: 28px; text-align: center;
        animation: fadein 0.6s ease;
      }
      #loader .repo-tag {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px; letter-spacing: 0.18em; color: var(--dim);
        text-transform: uppercase;
      }
      #loader .logo {
        font-size: clamp(48px, 9vw, 110px);
        font-weight: 800; letter-spacing: -0.04em; line-height: 1;
        background: linear-gradient(120deg, var(--orange), var(--yellow), var(--purple));
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 0 50px rgba(123, 104, 238, 0.25);
      }
      #loader .sub {
        color: var(--dim); font-size: 14px; letter-spacing: 0.25em; text-transform: uppercase;
      }
      #loader .summary {
        max-width: 720px; line-height: 1.6; font-size: 15px; color: #c8c8e0;
        margin: 4px 0 8px;
      }
      #loader #enter {
        position: relative;
        padding: 18px 56px; font-size: 14px; letter-spacing: 0.3em; font-weight: 700;
        background: linear-gradient(135deg, var(--orange), var(--purple));
        color: white; border: 0; border-radius: 999px; cursor: pointer;
        box-shadow: 0 12px 40px -10px rgba(255, 107, 53, 0.6), 0 0 0 1px rgba(255,255,255,0.08) inset;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        text-transform: uppercase;
      }
      #loader #enter:hover { transform: translateY(-2px); box-shadow: 0 18px 50px -10px rgba(255, 107, 53, 0.75); }
      #loader #enter:active { transform: translateY(1px); }
      #loader .controls {
        display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
        margin-top: 12px; color: var(--dim); font-size: 12px;
      }
      #loader .controls span { display: inline-flex; align-items: center; gap: 6px; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

      #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
      #crosshair {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        font: 700 18px/1 ui-monospace, monospace; color: rgba(255,255,255,0.7);
        text-shadow: 0 0 10px rgba(123, 104, 238, 0.8);
        mix-blend-mode: screen;
      }
      #focus {
        position: absolute; left: 50%; top: calc(50% + 30px); transform: translateX(-50%);
        padding: 6px 12px; background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
        font-size: 12px; letter-spacing: 0.05em; color: var(--ink);
        opacity: 0; transition: opacity 0.15s; white-space: nowrap; max-width: 80vw;
        overflow: hidden; text-overflow: ellipsis;
      }
      #focus.on { opacity: 1; }
      #focus .hint { color: var(--dim); margin-left: 8px; font-size: 11px; }

      #topbar {
        position: absolute; top: 16px; left: 16px; right: 16px;
        display: flex; justify-content: space-between; align-items: center;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
        color: var(--dim); letter-spacing: 0.08em;
      }
      #topbar .left { display: flex; align-items: center; gap: 12px; }
      #topbar .brand {
        font-weight: 700; letter-spacing: 0.18em; color: var(--ink);
        background: linear-gradient(120deg, var(--orange), var(--purple));
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      #topbar .dim { color: var(--dim); }

      #legend {
        position: absolute; top: 50px; left: 16px;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
        padding: 10px 12px; font-size: 11px; min-width: 140px;
      }
      #legend .ttl { color: var(--dim); letter-spacing: 0.12em; font-size: 10px; text-transform: uppercase; margin-bottom: 6px; }
      #legend .row { display: flex; align-items: center; gap: 8px; padding: 2px 0; color: #c8c8e0; }
      #legend .dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

      #minimap-wrap {
        position: absolute; right: 16px; bottom: 16px;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
        padding: 8px;
      }
      #minimap-wrap .ttl { color: var(--dim); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; padding-left: 4px; }
      #minimap { display: block; border-radius: 4px; }

      #controls-hud {
        position: absolute; left: 16px; bottom: 16px;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
        padding: 10px 12px; font-size: 11px; color: var(--dim);
        display: flex; flex-direction: column; gap: 4px;
      }
      #controls-hud .row { display: flex; gap: 8px; align-items: center; }
      #controls-hud .row .label { color: #c8c8e0; min-width: 56px; }

      #panel {
        position: fixed; inset: 0; z-index: 50;
        display: flex; align-items: center; justify-content: center;
        background: rgba(2, 2, 8, 0.6); backdrop-filter: blur(6px);
        animation: fadein 0.2s ease;
      }
      #panel .card {
        position: relative; max-width: 640px; width: calc(100% - 32px);
        max-height: 80vh; overflow-y: auto;
        background: #0d0d18; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px; padding: 28px 28px 22px;
        box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(123, 104, 238, 0.15);
      }
      #panel .close {
        position: absolute; top: 12px; right: 14px;
        background: transparent; color: var(--dim); border: 0;
        font-size: 24px; cursor: pointer; padding: 4px 10px;
      }
      #panel .close:hover { color: var(--ink); }
      #panel .layer-tag {
        display: inline-block; padding: 3px 10px; border-radius: 999px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px;
        letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px;
        color: #fff;
      }
      #panel h2 { margin: 0 0 8px; font-size: 28px; letter-spacing: -0.02em; }
      #panel .purpose { color: #c8c8e0; line-height: 1.55; margin: 0 0 18px; }
      #panel h3 {
        font-size: 11px; color: var(--dim); letter-spacing: 0.18em;
        text-transform: uppercase; margin: 16px 0 8px;
      }
      #panel ul { margin: 0; padding: 0; list-style: none; }
      #panel ul li {
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
        padding: 6px 10px; background: rgba(255,255,255,0.03);
        border-radius: 5px; margin-bottom: 4px; color: #d4d4e8;
      }
      #panel .conn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 10px; margin: 3px 4px 0 0;
        background: rgba(123, 104, 238, 0.08); border: 1px solid rgba(123, 104, 238, 0.25);
        border-radius: 999px; font-size: 12px; cursor: pointer;
        transition: background 0.15s;
      }
      #panel .conn:hover { background: rgba(123, 104, 238, 0.18); }
      #panel .conn .arrow { color: var(--dim); font-size: 10px; }
      #panel .conn .kind { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
      #panel .actions { display: flex; gap: 10px; margin-top: 22px; }
      #panel .actions button {
        flex: 1; padding: 11px 16px; border-radius: 8px; cursor: pointer;
        font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
        border: 1px solid transparent; transition: transform 0.1s;
      }
      #panel .actions button:active { transform: translateY(1px); }
      #panel .actions .primary {
        background: linear-gradient(135deg, var(--orange), var(--purple)); color: white;
      }
      #panel .actions .ghost {
        background: transparent; color: var(--ink); border-color: rgba(255,255,255,0.18);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="loader">
      <div class="repo-tag">▷ __REPO_NAME__</div>
      <div class="logo">CLAUDECOG</div>
      <div class="sub">walkthrough mode</div>
      <p class="summary">__SUMMARY__</p>
      <button id="enter">Enter the map</button>
      <div class="controls">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
        <span><kbd>mouse</kbd> look</span>
        <span><kbd>space</kbd> up · <kbd>shift</kbd> down</span>
        <span><kbd>click</kbd> open module</span>
        <span><kbd>esc</kbd> release</span>
      </div>
    </div>

    <div id="hud" hidden>
      <div id="topbar">
        <div class="left">
          <span class="brand">CLAUDECOG</span>
          <span class="dim">·</span>
          <span>__REPO_NAME__</span>
          <span class="dim">·</span>
          <span class="dim">__GENERATED_AT__</span>
        </div>
        <div class="right">
          <span id="pos">0, 5, 30</span>
        </div>
      </div>
      <div id="legend"><div class="ttl">Layers</div></div>
      <div id="crosshair">+</div>
      <div id="focus"></div>
      <div id="minimap-wrap">
        <div class="ttl">Map</div>
        <canvas id="minimap" width="220" height="220"></canvas>
      </div>
      <div id="controls-hud">
        <div class="row"><span class="label"><kbd>WASD</kbd></span> move</div>
        <div class="row"><span class="label"><kbd>SPACE</kbd></span> up</div>
        <div class="row"><span class="label"><kbd>SHIFT</kbd></span> down</div>
        <div class="row"><span class="label"><kbd>CLICK</kbd></span> open module</div>
        <div class="row"><span class="label"><kbd>ESC</kbd></span> release mouse</div>
      </div>
    </div>

    <div id="panel" hidden>
      <div class="card">
        <button class="close" id="panel-close">×</button>
        <div class="layer-tag" id="panel-layer"></div>
        <h2 id="panel-name"></h2>
        <p class="purpose" id="panel-purpose"></p>
        <h3>Files</h3>
        <ul id="panel-files"></ul>
        <h3>Connections</h3>
        <div id="panel-conns"></div>
        <div class="actions">
          <button class="primary" id="panel-teleport">Teleport here</button>
          <button class="ghost" id="panel-resume">Resume walk</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
    <script>
      const DATA = __DATA__;

      // ----- layer styling --------------------------------------------------
      const LAYER_PALETTE = {
        interface:   { color: 0xff6b35, name: 'interface' },
        ui:          { color: 0xff6b35, name: 'ui' },
        application: { color: 0xf7b801, name: 'application' },
        api:         { color: 0xf7b801, name: 'api' },
        feature:     { color: 0xa855f7, name: 'feature' },
        domain:      { color: 0x10b981, name: 'domain' },
        core:        { color: 0x10b981, name: 'core' },
        data:        { color: 0x14b8a6, name: 'data' },
        integration: { color: 0x06b6d4, name: 'integration' },
        service:     { color: 0x06b6d4, name: 'service' },
        render:      { color: 0xa855f7, name: 'render' },
        infrastructure: { color: 0x6366f1, name: 'infrastructure' },
        infra:       { color: 0x6366f1, name: 'infra' },
        other:       { color: 0x6b7280, name: 'other' },
      };
      function paletteFor(layer) {
        const k = (layer || 'other').toLowerCase();
        return LAYER_PALETTE[k] || { color: 0x7b68ee, name: k || 'other' };
      }

      // ----- layout: group by layer, dispose modules in rings --------------
      const layerOrder = [];
      const byLayer = {};
      for (const m of DATA.modules) {
        const l = (m.layer || 'other').toLowerCase();
        if (!byLayer[l]) { byLayer[l] = []; layerOrder.push(l); }
        byLayer[l].push(m);
      }

      const LAYER_HEIGHT = 9;
      const positions = new Map(); // module.id -> THREE.Vector3
      const halfLayers = (layerOrder.length - 1) / 2;
      layerOrder.forEach((layer, lidx) => {
        const mods = byLayer[layer];
        const y = (lidx - halfLayers) * LAYER_HEIGHT;
        const radius = Math.max(10, mods.length * 3.2);
        mods.forEach((m, i) => {
          const a = (i / Math.max(mods.length, 1)) * Math.PI * 2;
          const jitter = ((i * 1664525 + 1013904223) % 1000) / 1000;
          const r = radius * (0.85 + jitter * 0.3);
          positions.set(m.id, new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
        });
      });

      // ----- three.js setup -------------------------------------------------
      const canvas = document.getElementById('canvas');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x04040a);
      scene.fog = new THREE.Fog(0x04040a, 60, 240);

      const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 800);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;

      // FPS rig: yaw + pitch + camera, so rotation order is correct
      const yawObj = new THREE.Object3D();
      const pitchObj = new THREE.Object3D();
      yawObj.add(pitchObj);
      pitchObj.add(camera);
      scene.add(yawObj);
      yawObj.position.set(0, 4, Math.max(35, layerOrder.length * 12));
      yawObj.lookAt = () => {}; // keep external code from messing with it

      // ----- world: stars, grid, lights -------------------------------------
      function makeStarfield() {
        const count = 1500;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const r = 280 + Math.random() * 200;
          const t = Math.random() * Math.PI * 2;
          const p = Math.acos(2 * Math.random() - 1);
          positions[i * 3]     = r * Math.sin(p) * Math.cos(t);
          positions[i * 3 + 1] = r * Math.cos(p);
          positions[i * 3 + 2] = r * Math.sin(p) * Math.sin(t);
        }
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({ size: 1.4, color: 0xffffff, transparent: true, opacity: 0.55, sizeAttenuation: false });
        return new THREE.Points(geo, mat);
      }
      scene.add(makeStarfield());

      // floor grid (one per layer slice, plus one ground)
      const groundY = -halfLayers * LAYER_HEIGHT - 6;
      const grid = new THREE.GridHelper(400, 80, 0x2a2a3a, 0x14141c);
      grid.position.y = groundY;
      scene.add(grid);

      // glowing layer disks
      const disks = [];
      layerOrder.forEach((layer, lidx) => {
        const y = (lidx - halfLayers) * LAYER_HEIGHT;
        const pal = paletteFor(layer);
        const radius = Math.max(14, byLayer[layer].length * 3.6);
        const ringGeo = new THREE.RingGeometry(radius, radius + 0.4, 96);
        const ringMat = new THREE.MeshBasicMaterial({ color: pal.color, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = y - 1.6;
        scene.add(ring);
        disks.push(ring);
      });

      scene.add(new THREE.AmbientLight(0xffffff, 0.35));
      const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
      keyLight.position.set(40, 80, 40);
      scene.add(keyLight);
      const rimLight = new THREE.DirectionalLight(0x7b68ee, 0.4);
      rimLight.position.set(-60, 30, -40);
      scene.add(rimLight);

      // ----- modules as towers ----------------------------------------------
      function makeLabelTexture(text, layerName, color) {
        const size = 512;
        const c = document.createElement('canvas');
        c.width = size; c.height = 160;
        const ctx = c.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, size, 160);
        // background pill
        const padX = 22, padY = 16, h = 100;
        const r = 18;
        ctx.font = '700 38px ui-sans-serif, system-ui, -apple-system, "Inter", "Segoe UI", Roboto, sans-serif';
        const w = Math.min(ctx.measureText(text).width + padX * 2, size - 8);
        const x0 = (size - w) / 2, y0 = padY;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.beginPath();
        ctx.moveTo(x0 + r, y0);
        ctx.arcTo(x0 + w, y0, x0 + w, y0 + h, r);
        ctx.arcTo(x0 + w, y0 + h, x0, y0 + h, r);
        ctx.arcTo(x0, y0 + h, x0, y0, r);
        ctx.arcTo(x0, y0, x0 + w, y0, r);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = `rgba(${(color >> 16) & 255}, ${(color >> 8) & 255}, ${color & 255}, 0.8)`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, size / 2, y0 + h / 2 - 6);
        ctx.font = '600 18px ui-monospace, "SF Mono", Menlo, monospace';
        ctx.fillStyle = `rgba(${(color >> 16) & 255}, ${(color >> 8) & 255}, ${color & 255}, 1)`;
        ctx.fillText(layerName.toUpperCase(), size / 2, y0 + h / 2 + 22);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
      }

      const moduleObjects = [];
      const moduleById = new Map();
      const towerGroup = new THREE.Group();
      scene.add(towerGroup);

      for (const m of DATA.modules) {
        const pal = paletteFor(m.layer);
        const pos = positions.get(m.id);
        const weight = Math.max(1, Math.min(10, m.weight ?? Math.max(1, (m.files || []).length)));
        const height = 2 + weight * 0.7;
        const radiusXZ = 1.1 + weight * 0.12;

        const group = new THREE.Group();
        group.position.copy(pos);

        // tower body
        const bodyGeo = new THREE.CylinderGeometry(radiusXZ, radiusXZ * 1.05, height, 24, 1, false);
        const bodyMat = new THREE.MeshStandardMaterial({
          color: pal.color,
          emissive: pal.color,
          emissiveIntensity: 0.55,
          metalness: 0.2,
          roughness: 0.35,
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = height / 2;
        body.userData = { module: m, baseEmissive: 0.55 };
        group.add(body);

        // halo (sprite for cheap glow)
        const haloMat = new THREE.SpriteMaterial({ color: pal.color, transparent: true, opacity: 0.35, depthWrite: false, blending: THREE.AdditiveBlending });
        const halo = new THREE.Sprite(haloMat);
        halo.scale.set(radiusXZ * 6, radiusXZ * 6, 1);
        halo.position.y = height / 2;
        group.add(halo);

        // base ring on the floor below
        const baseGeo = new THREE.RingGeometry(radiusXZ * 1.4, radiusXZ * 1.6, 32);
        const baseMat = new THREE.MeshBasicMaterial({ color: pal.color, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.rotation.x = -Math.PI / 2;
        base.position.y = 0.02;
        group.add(base);

        // floating label
        const labelTex = makeLabelTexture(m.name, paletteFor(m.layer).name, pal.color);
        const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, depthTest: false, depthWrite: false });
        const label = new THREE.Sprite(labelMat);
        label.scale.set(8, 2.5, 1);
        label.position.y = height + 1.6;
        label.renderOrder = 999;
        group.add(label);

        // pulse light inside
        const pulse = new THREE.PointLight(pal.color, 0.9, 18, 2);
        pulse.position.y = height / 2;
        group.add(pulse);

        towerGroup.add(group);
        moduleObjects.push(body);
        moduleById.set(m.id, { mod: m, group, body, halo, label, pulse, baseEmissive: 0.55, color: pal.color });
      }

      // ----- relationships as glowing lines ---------------------------------
      const linkGroup = new THREE.Group();
      scene.add(linkGroup);
      for (const r of DATA.relationships || []) {
        const a = positions.get(r.source);
        const b = positions.get(r.target);
        if (!a || !b) continue;
        const palA = paletteFor((moduleById.get(r.source)?.mod?.layer) || 'other');
        const palB = paletteFor((moduleById.get(r.target)?.mod?.layer) || 'other');

        const start = a.clone().add(new THREE.Vector3(0, 0.5, 0));
        const end = b.clone().add(new THREE.Vector3(0, 0.5, 0));
        const mid = start.clone().add(end).multiplyScalar(0.5);
        const dist = start.distanceTo(end);
        mid.y += Math.min(dist * 0.18, 4);

        const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
        const points = curve.getPoints(28);
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const colors = new Float32Array(points.length * 3);
        for (let i = 0; i < points.length; i++) {
          const t = i / (points.length - 1);
          const ar = (palA.color >> 16) & 255, ag = (palA.color >> 8) & 255, ab = palA.color & 255;
          const br = (palB.color >> 16) & 255, bg = (palB.color >> 8) & 255, bb = palB.color & 255;
          colors[i * 3]     = (ar + (br - ar) * t) / 255;
          colors[i * 3 + 1] = (ag + (bg - ag) * t) / 255;
          colors[i * 3 + 2] = (ab + (bb - ab) * t) / 255;
        }
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending, depthWrite: false });
        const line = new THREE.Line(geo, mat);
        line.userData = { rel: r };
        linkGroup.add(line);
      }

      // ----- input ----------------------------------------------------------
      const keys = Object.create(null);
      let isLocked = false;

      window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'Escape' && document.getElementById('panel').hidden === false) {
          closePanel();
        }
      });
      window.addEventListener('keyup', (e) => { keys[e.code] = false; });

      window.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        const sens = 0.0022;
        yawObj.rotation.y -= e.movementX * sens;
        pitchObj.rotation.x -= e.movementY * sens;
        const lim = Math.PI / 2 - 0.05;
        pitchObj.rotation.x = Math.max(-lim, Math.min(lim, pitchObj.rotation.x));
      });

      function lockPointer() { document.body.requestPointerLock(); }
      document.addEventListener('pointerlockchange', () => {
        isLocked = document.pointerLockElement === document.body;
      });

      const enterBtn = document.getElementById('enter');
      enterBtn.addEventListener('click', () => {
        document.getElementById('loader').hidden = true;
        document.getElementById('hud').hidden = false;
        lockPointer();
      });

      window.addEventListener('click', (e) => {
        if (document.getElementById('panel').hidden === false) return;
        if (document.getElementById('loader').hidden === false) return;
        if (!isLocked) { lockPointer(); return; }
        if (focusedId) { openPanelFor(focusedId); }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ----- raycast / focus -----------------------------------------------
      const raycaster = new THREE.Raycaster();
      const center = new THREE.Vector2(0, 0);
      let focusedId = null;
      const focusEl = document.getElementById('focus');

      function updateFocus() {
        raycaster.setFromCamera(center, camera);
        const hits = raycaster.intersectObjects(moduleObjects, false);
        const hit = hits[0]?.object?.userData?.module || null;
        const id = hit?.id || null;
        if (id !== focusedId) {
          if (focusedId) {
            const prev = moduleById.get(focusedId);
            if (prev) {
              prev.body.material.emissiveIntensity = prev.baseEmissive;
              prev.halo.material.opacity = 0.35;
            }
          }
          focusedId = id;
          if (id) {
            const cur = moduleById.get(id);
            cur.body.material.emissiveIntensity = 1.6;
            cur.halo.material.opacity = 0.7;
            focusEl.innerHTML = `<b>${escapeHtml(hit.name)}</b><span class="hint">click to inspect</span>`;
            focusEl.classList.add('on');
          } else {
            focusEl.classList.remove('on');
          }
        }
      }

      function escapeHtml(s) {
        return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      // ----- legend ---------------------------------------------------------
      const legend = document.getElementById('legend');
      const seenLayers = new Set();
      for (const m of DATA.modules) {
        const l = (m.layer || 'other').toLowerCase();
        if (seenLayers.has(l)) continue;
        seenLayers.add(l);
        const pal = paletteFor(l);
        const row = document.createElement('div');
        row.className = 'row';
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = '#' + pal.color.toString(16).padStart(6, '0');
        dot.style.color = '#' + pal.color.toString(16).padStart(6, '0');
        row.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = pal.name;
        row.appendChild(label);
        legend.appendChild(row);
      }

      // ----- minimap --------------------------------------------------------
      const minimap = document.getElementById('minimap');
      const mctx = minimap.getContext('2d');
      const minimapBounds = (() => {
        let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
        positions.forEach((p) => {
          if (p.x < minX) minX = p.x;
          if (p.x > maxX) maxX = p.x;
          if (p.z < minZ) minZ = p.z;
          if (p.z > maxZ) maxZ = p.z;
        });
        const padX = (maxX - minX) * 0.2 + 4;
        const padZ = (maxZ - minZ) * 0.2 + 4;
        return { minX: minX - padX, maxX: maxX + padX, minZ: minZ - padZ, maxZ: maxZ + padZ };
      })();

      function drawMinimap() {
        const w = minimap.width, h = minimap.height;
        mctx.clearRect(0, 0, w, h);
        mctx.fillStyle = 'rgba(20, 20, 28, 0.9)';
        mctx.fillRect(0, 0, w, h);
        mctx.strokeStyle = 'rgba(255,255,255,0.06)';
        for (let i = 1; i < 4; i++) {
          mctx.beginPath();
          mctx.moveTo((w / 4) * i, 0); mctx.lineTo((w / 4) * i, h);
          mctx.moveTo(0, (h / 4) * i); mctx.lineTo(w, (h / 4) * i);
          mctx.stroke();
        }
        const sx = (x) => ((x - minimapBounds.minX) / (minimapBounds.maxX - minimapBounds.minX)) * w;
        const sz = (z) => ((z - minimapBounds.minZ) / (minimapBounds.maxZ - minimapBounds.minZ)) * h;

        // links
        mctx.strokeStyle = 'rgba(123, 104, 238, 0.25)';
        mctx.lineWidth = 1;
        for (const r of DATA.relationships || []) {
          const a = positions.get(r.source), b = positions.get(r.target);
          if (!a || !b) continue;
          mctx.beginPath();
          mctx.moveTo(sx(a.x), sz(a.z));
          mctx.lineTo(sx(b.x), sz(b.z));
          mctx.stroke();
        }
        // modules
        for (const m of DATA.modules) {
          const p = positions.get(m.id);
          const pal = paletteFor(m.layer);
          const isFocus = m.id === focusedId;
          mctx.fillStyle = '#' + pal.color.toString(16).padStart(6, '0');
          mctx.beginPath();
          mctx.arc(sx(p.x), sz(p.z), isFocus ? 4.5 : 3, 0, Math.PI * 2);
          mctx.fill();
          if (isFocus) {
            mctx.strokeStyle = '#fff';
            mctx.lineWidth = 1.5;
            mctx.stroke();
          }
        }
        // player
        const px = sx(yawObj.position.x);
        const pz = sz(yawObj.position.z);
        mctx.save();
        mctx.translate(px, pz);
        mctx.rotate(-yawObj.rotation.y);
        mctx.fillStyle = '#ff6b35';
        mctx.beginPath();
        mctx.moveTo(0, -7);
        mctx.lineTo(5, 5);
        mctx.lineTo(-5, 5);
        mctx.closePath();
        mctx.fill();
        mctx.restore();
      }

      // ----- detail panel ---------------------------------------------------
      const panel = document.getElementById('panel');
      function openPanelFor(id) {
        const cur = moduleById.get(id);
        if (!cur) return;
        const m = cur.mod;
        const pal = paletteFor(m.layer);
        const hex = '#' + pal.color.toString(16).padStart(6, '0');
        const tag = document.getElementById('panel-layer');
        tag.textContent = pal.name;
        tag.style.background = hex;
        document.getElementById('panel-name').textContent = m.name;
        document.getElementById('panel-purpose').textContent = m.purpose || '';
        const filesUl = document.getElementById('panel-files');
        filesUl.innerHTML = '';
        for (const f of (m.files || [])) {
          const li = document.createElement('li');
          li.textContent = f;
          filesUl.appendChild(li);
        }
        const conns = document.getElementById('panel-conns');
        conns.innerHTML = '';
        for (const r of (DATA.relationships || [])) {
          if (r.source !== id && r.target !== id) continue;
          const otherId = r.source === id ? r.target : r.source;
          const other = moduleById.get(otherId);
          if (!other) continue;
          const out = r.source === id;
          const el = document.createElement('span');
          el.className = 'conn';
          el.innerHTML = `<span class="arrow">${out ? '→' : '←'}</span> <b>${escapeHtml(other.mod.name)}</b> <span class="kind">${escapeHtml(r.kind || '')}</span>`;
          el.addEventListener('click', () => {
            closePanel();
            setTimeout(() => openPanelFor(otherId), 50);
          });
          conns.appendChild(el);
        }
        panel.hidden = false;
        if (document.exitPointerLock) document.exitPointerLock();
      }
      function closePanel() {
        panel.hidden = true;
      }
      document.getElementById('panel-close').addEventListener('click', closePanel);
      document.getElementById('panel-resume').addEventListener('click', () => { closePanel(); lockPointer(); });
      document.getElementById('panel-teleport').addEventListener('click', () => {
        if (!focusedId) return;
        const target = positions.get(focusedId);
        if (!target) return;
        const dir = new THREE.Vector3().subVectors(yawObj.position, target).setY(0).normalize();
        const dest = target.clone().addScaledVector(dir.lengthSq() ? dir : new THREE.Vector3(0, 0, 1), 9);
        dest.y = target.y + 4;
        yawObj.position.copy(dest);
        yawObj.lookAt = () => {};
        const desiredYaw = Math.atan2(target.x - dest.x, target.z - dest.z);
        yawObj.rotation.y = desiredYaw;
        pitchObj.rotation.x = -0.12;
        closePanel();
        lockPointer();
      });
      panel.addEventListener('click', (e) => { if (e.target === panel) closePanel(); });

      // ----- main loop ------------------------------------------------------
      const clock = new THREE.Clock();
      const tmpDir = new THREE.Vector3();
      const posEl = document.getElementById('pos');
      let mmTimer = 0;

      function tick() {
        const dt = Math.min(clock.getDelta(), 0.1);
        const t = performance.now() * 0.001;

        // movement
        if (isLocked) {
          let speed = 22;
          if (keys.ShiftRight || keys.ControlLeft) speed *= 2.2;
          tmpDir.set(0, 0, 0);
          if (keys.KeyW || keys.ArrowUp) tmpDir.z -= 1;
          if (keys.KeyS || keys.ArrowDown) tmpDir.z += 1;
          if (keys.KeyA || keys.ArrowLeft) tmpDir.x -= 1;
          if (keys.KeyD || keys.ArrowRight) tmpDir.x += 1;
          if (tmpDir.lengthSq() > 0) {
            tmpDir.normalize();
            tmpDir.applyEuler(new THREE.Euler(0, yawObj.rotation.y, 0));
            yawObj.position.x += tmpDir.x * speed * dt;
            yawObj.position.z += tmpDir.z * speed * dt;
          }
          if (keys.Space) yawObj.position.y += speed * dt;
          if (keys.ShiftLeft) yawObj.position.y -= speed * dt;
          // soft world bounds
          const limit = 220;
          yawObj.position.x = Math.max(-limit, Math.min(limit, yawObj.position.x));
          yawObj.position.z = Math.max(-limit, Math.min(limit, yawObj.position.z));
          yawObj.position.y = Math.max(-50, Math.min(80, yawObj.position.y));
        }

        // pulse modules
        moduleById.forEach((cur) => {
          const pulse = 0.55 + Math.sin(t * 1.4 + cur.group.position.x * 0.1) * 0.1;
          if (cur.mod.id !== focusedId) {
            cur.body.material.emissiveIntensity = pulse;
            cur.halo.material.opacity = 0.3 + Math.sin(t * 1.7 + cur.group.position.z * 0.1) * 0.05;
          }
          cur.label.position.y = (cur.body.geometry.parameters.height) + 1.6 + Math.sin(t + cur.group.position.x) * 0.15;
        });

        // disk rotation
        for (const d of disks) d.rotation.z += dt * 0.05;

        if (isLocked) updateFocus();

        // hud updates
        const p = yawObj.position;
        posEl.textContent = `${p.x.toFixed(0)}, ${p.y.toFixed(0)}, ${p.z.toFixed(0)}`;

        mmTimer += dt;
        if (mmTimer > 0.05) { drawMinimap(); mmTimer = 0; }

        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }

      drawMinimap();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    </script>
  </body>
</html>
